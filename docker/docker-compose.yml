# DragnCardsAI Docker Compose
#
# Services:
#   postgres      - PostgreSQL database for DragnCards
#   mc-plugin     - Builds Marvel Champions plugin (TSV + JSON artifacts)
#   backend       - DragnCards Elixir/Phoenix backend (seeds user + plugin on first run)
#   frontend      - DragnCards React frontend (dev server)
#   game-service  - Python HTTP API + MCP server for LLM game interaction
#
# Usage:
#   docker compose build
#   docker compose up -d
#
# Access:
#   Frontend:     http://localhost:3000
#   Backend:      http://localhost:4000 (WebSocket at ws://localhost:4000/socket)
#   Mailbox:      http://localhost:4000/dev/mailbox (dev email viewer)
#   Game Service: http://localhost:8000 (HTTP API)
#   Login:        dev_user@example.com / password

services:
  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  mc-plugin:
    build:
      context: .
      dockerfile: mc-plugin/Dockerfile
    # This service just builds plugin artifacts and exits.
    # The artifacts are stored in a named volume for the backend to use.
    volumes:
      - mc-plugin-data:/output
    entrypoint: >
      sh -c "cp -r /plugin/json /output/json && cp -r /plugin/tsv /output/tsv && echo 'Plugin artifacts copied to volume' && ls -la /output/json/ /output/tsv/"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      mc-plugin:
        condition: service_completed_successfully
    ports:
      - "4000:4000"
    volumes:
      - mc-plugin-data:/plugin:ro
    environment:
      DB_HOSTNAME: postgres

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_BE_HOSTNAME: backend

  game-service:
    build:
      context: ..
      dockerfile: docker/game-service/Dockerfile
    depends_on:
      - backend
    ports:
      - "8000:8000"
    environment:
      DRAGNCARDS_HTTP_URL: http://backend:4000
      DRAGNCARDS_WS_URL: ws://backend:4000/socket
      BOT_EMAIL: dev_user@example.com
      BOT_PASSWORD: password
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: "8000"

volumes:
  pgdata:
  mc-plugin-data:
